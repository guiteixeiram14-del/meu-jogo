<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>O Guarani RPG Responsivo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; }

/* Pixel font stack — works 100% offline */
:root {
  --rpg-font: 'Courier New', 'Lucida Console', monospace;
}

:root {
  --rpg-gold: #f8d870;
  --rpg-gold-dark: #c8a820;
  --rpg-dark: #0a0a0a;
  --rpg-panel: #1a1a2e;
  --rpg-panel-light: #16213e;
  --rpg-border: #f8d870;
  --rpg-text: #f0e6c8;
  --rpg-green-bg: #3a7a2a;
  --rpg-white: #f0e6c8;
  --rpg-shadow: #000;
  --pixel: 3px;
}

body {
  margin: 0;
  padding: 0;
  font-family: var(--rpg-font);
  background: #0a0a0a;
  overflow: hidden;
}

/* === CONTAINER DO JOGO === */
#game {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
  background: #0a0a0a;
  overflow: hidden;
}

/* Scanline overlay for CRT feel */
#game::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.04) 2px,
    rgba(0,0,0,0.04) 4px
  );
  pointer-events: none;
  z-index: 100;
}

/* FUNDO */
#bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 72%;
  background-size: cover;
  background-position: center;
  box-sizing: border-box;
  transition: opacity 0.4s ease;
  image-rendering: pixelated;
}

/* Scene transition flash */
#bg.changing {
  opacity: 0;
}

/* PERSONAGEM */
#character {
  position: absolute;
  bottom: 90px;
  left: 30px;
  width: 72px;
  image-rendering: pixelated;
  z-index: 3;
  filter: drop-shadow(3px 3px 0 rgba(0,0,0,0.7));
  transition: opacity 0.3s ease;
}

/* Idle bob animation */
@keyframes charBob {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-3px); }
}
#character:not(.hidden) {
  animation: charBob 1.8s ease-in-out infinite;
}

/* NOME DO PERSONAGEM */
#nameBox {
  position: absolute;
  bottom: 150px;
  left: 110px;
  background: var(--rpg-panel);
  color: var(--rpg-gold);
  font-family: var(--rpg-font);
  font-size: 12px;
  padding: 5px 10px;
  z-index: 4;
  letter-spacing: 1px;
  /* Pixel-perfect border */
  border: 2px solid var(--rpg-gold);
  outline: 2px solid #000;
  box-shadow: 3px 3px 0 #000;
  text-transform: uppercase;
}

/* CAIXA DE TEXTO */
#dialog {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 30%;
  background: var(--rpg-panel);
  border-top: 4px solid var(--rpg-gold);
  border-bottom: 4px solid #000;
  border-left: 4px solid #000;
  border-right: 4px solid #000;
  box-sizing: border-box;
  padding: 10px 12px 8px 12px;
  box-shadow: inset 0 1px 0 rgba(248,216,112,0.15);
  /* Flexbox: texto cresce, skip fica sempre visível embaixo */
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* Top decorative bar on dialog */
#dialog::before {
  content: '';
  position: absolute;
  top: -8px;
  left: -4px;
  right: -4px;
  height: 4px;
  background: #000;
}

/* Cursor piscando no canto — só aparece quando texto termina */
#dialog::after {
  content: '▶';
  position: absolute;
  right: 12px;
  bottom: 10px;
  color: var(--rpg-gold);
  font-size: 8px;
  opacity: 0;
  animation: blink 0.8s step-end infinite;
  pointer-events: none;
}
#dialog.done::after { opacity: 1; }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* TEXTO */
#text {
  font-family: var(--rpg-font);
  font-size: 13px;
  line-height: 1.75;
  color: var(--rpg-text);
  letter-spacing: 0.3px;
  flex: 1;
  overflow: hidden;
}

/* BOTÃO SKIP — sempre na base, nunca some */
#skip {
  display: block;
  align-self: flex-start;
  margin-top: 6px;
  background: var(--rpg-dark);
  color: var(--rpg-gold);
  font-family: var(--rpg-font);
  font-size: 11px;
  padding: 6px 14px;
  cursor: pointer;
  border: 2px solid var(--rpg-gold);
  outline: 1px solid #000;
  box-shadow: 2px 2px 0 #000;
  letter-spacing: 1px;
  user-select: none;
  transition: transform 0.08s, box-shadow 0.08s;
  text-transform: uppercase;
  flex-shrink: 0;
  /* Garante área de toque generosa no mobile */
  min-height: 36px;
  min-width: 80px;
}

#skip:active {
  transform: translate(2px, 2px);
  box-shadow: none;
}

#skip:hover {
  background: var(--rpg-gold-dark);
  color: #000;
}

/* QUIZ */
#choices {
  margin-top: 6px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

#choices button {
  padding: 7px 6px;
  border: 2px solid var(--rpg-gold);
  outline: 1px solid #000;
  background: var(--rpg-panel-light);
  color: var(--rpg-text);
  font-family: var(--rpg-font);
  font-size: 11px;
  cursor: pointer;
  box-shadow: 2px 2px 0 #000;
  transition: transform 0.08s, box-shadow 0.08s, background 0.1s;
  text-align: left;
  line-height: 1.6;
  letter-spacing: 0.3px;
}

#choices button:hover {
  background: var(--rpg-gold-dark);
  color: #000;
  border-color: #fff;
}

#choices button:active {
  transform: translate(2px, 2px);
  box-shadow: none;
}

/* TELA FINAL */
#finalScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.97);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

#finalBox {
  background: var(--rpg-panel);
  border: 3px solid var(--rpg-gold);
  outline: 3px solid #000;
  box-shadow:
    6px 6px 0 #000,
    0 0 0 9px #000,
    0 0 0 12px var(--rpg-gold);
  padding: 30px 36px;
  text-align: center;
  color: var(--rpg-gold);
  font-family: var(--rpg-font);
  font-size: 13px;
  line-height: 2.2;
  letter-spacing: 1px;
  max-width: 360px;
}

#finalBox .trophy {
  font-size: 28px;
  display: block;
  margin-bottom: 14px;
  animation: spin 2s ease-in-out infinite alternate;
}

@keyframes spin {
  0% { transform: scale(1) rotate(-5deg); }
  100% { transform: scale(1.1) rotate(5deg); }
}

#finalBox .title-line {
  color: #fff;
  font-size: 12px;
  display: block;
  margin-bottom: 16px;
  text-shadow: 2px 2px 0 var(--rpg-gold-dark);
}

#finalBox .score-line {
  color: var(--rpg-gold);
  font-size: 8px;
  margin-top: 10px;
  display: block;
}

/* Progress dots at top */
#progressBar {
  position: absolute;
  top: 6px;
  right: 10px;
  z-index: 10;
  display: flex;
  gap: 4px;
  align-items: center;
}

.prog-dot {
  width: 5px;
  height: 5px;
  background: #333;
  border: 1px solid #555;
  image-rendering: pixelated;
  transition: background 0.3s;
}
.prog-dot.done {
  background: var(--dot-cor, var(--rpg-gold));
  border-color: #fff;
}

/* HP / Step counter */
#stepCounter {
  position: absolute;
  top: 6px;
  left: 8px;
  z-index: 10;
  color: var(--rpg-gold);
  font-family: var(--rpg-font);
  font-size: 11px;
  background: rgba(0,0,0,0.6);
  padding: 3px 7px;
  border: 1px solid var(--rpg-gold-dark);
  letter-spacing: 1px;
}

/* === RESPONSIVO: PAISAGEM === */
/* === PORTRAIT MOBILE (celular em pé) === */
@media (max-width: 600px) and (orientation: portrait) {
  body {
    align-items: stretch;
  }
  #bg {
    height: 65%;
  }
  #character {
    width: 68px;
    bottom: 31%;
    left: 10px;
  }
  #nameBox {
    font-size: 11px;
    bottom: calc(31% + 78px);
    left: 86px;
    padding: 4px 8px;
  }
  #dialog {
    height: 35%;
    padding: 10px 12px 8px 12px;
  }
  #text {
    font-size: 11px;
    line-height: 1.65;
  }
  #skip {
    font-size: 11px;
    padding: 7px 14px;
    min-height: 38px;
  }
  #choices {
    gap: 5px;
  }
  #choices button {
    font-size: 10px;
    padding: 7px 5px;
  }
  #stepCounter { font-size: 9px; }
}

/* === LANDSCAPE MOBILE (celular deitado) === */
@media (orientation: landscape) and (max-height: 500px) {
  body {
    align-items: stretch;
  }

  #bg {
    height: 68%;
    /* Compensar o padding do #game */
    width: 100%;
  }
  #character {
    bottom: 30%;
    max-width: 10vw;
    left: 3vw;
  }
  #nameBox {
    bottom: 37%;
    font-size: clamp(8px, 1.3vw, 11px);
    left: 17%;
    padding: 3px 7px;
  }
  #dialog {
    height: 32%;
    padding: 6px 12px 6px 12px;
  }
  #text {
    font-size: clamp(9px, 1.5vw, 12px);
    line-height: 1.6;
  }
  #skip {
    font-size: clamp(9px, 1.3vw, 11px);
    padding: 5px 10px;
    min-height: 32px;
  }
  #choices button {
    font-size: clamp(8px, 1.2vw, 11px);
    padding: clamp(4px, 0.8vh, 8px) 5px;
  }
  #stepCounter { font-size: 9px; }
  #finalBox {
    font-size: 10px;
    padding: 16px 20px;
    max-width: 70vw;
  }
}
</style>
</head>
<body>

<div id="game">
  <div id="stepCounter">★ CAP.1</div>
  <div id="progressBar"></div>

  <div id="bg"></div>
  <img id="character" src="img/alencar.png" alt="character">
  <div id="nameBox">Alencar</div>

  <div id="dialog">
    <div id="text"></div>
    <div id="choices" class="hidden"></div>
    <div id="skip">▶ SKIP</div>
  </div>
</div>

<div id="finalScreen">
  <div id="finalBox">
    <span class="trophy">🏆</span>
    <span class="title-line">PARABÉNS!</span>
    Você concluiu<br>
    O Guarani!<br>
    Quiz: acertou quantas?<br>
    <span class="score-line" id="scoreDisplay"></span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// ROTEIRO COMPLETO — array de cenas
// Cada cena: { nome, img, char, texto }
// ═══════════════════════════════════════════════
const cenas = [

  // ── ALENCAR ──────────────────────────────────
  {
    nome: "Alencar", bg: "img/fundo_biblioteca.png", char: "img/alencar.png",
    texto: "Olá, viajante... Eu sou José de Alencar.\nNasci no Ceará em 1829 e me tornei\num dos maiores escritores do Romantismo brasileiro."
  },
  {
    nome: "Alencar", bg: null, char: null,
    texto: "Fui advogado, jornalista e político.\nMas foi pela literatura que deixei\nminha marca mais profunda na história do Brasil."
  },
  {
    nome: "Alencar", bg: null, char: null,
    texto: "No século XIX, o Brasil acabara de se tornar\nindependente de Portugal. Havia uma grande\nnecessidade de construir uma identidade nacional."
  },
  {
    nome: "Alencar", bg: null, char: null,
    texto: "Muitos intelectuais olhavam apenas para a Europa\ncomo modelo de civilização e cultura.\nEu discordava profundamente disso."
  },
  {
    nome: "Alencar", bg: null, char: null,
    texto: "O Brasil tinha sua própria riqueza:\na natureza exuberante, os povos indígenas,\nos costumes únicos que surgiram nestas terras."
  },
  {
    nome: "Alencar", bg: null, char: null,
    texto: "Por isso escrevi O Guarani, publicado em 1857.\nPrimeiro como folhetim no Correio Mercantil,\ndepois como livro que conquistou o país."
  },
  {
    nome: "Alencar", bg: null, char: null,
    texto: "Minha obra coloca o indígena como herói nacional.\nPeri não é um selvagem — ele é nobre,\ncorajoso, leal e profundamente humano."
  },
  {
    nome: "Alencar", bg: null, char: null,
    texto: "O amor entre Peri e Cecília simboliza\na mistura de culturas que formou o povo brasileiro.\nIsso é o que nos torna únicos no mundo."
  },
  {
    nome: "Alencar", bg: null, char: null,
    texto: "O Guarani faz parte da minha trilogia indianista,\njunto com Iracema e Ubirajara.\nTodas exaltam a alma da terra brasileira."
  },
  {
    nome: "Alencar", bg: null, char: null,
    texto: "Espero que ao conhecer Peri e Ceci,\nvocê entenda melhor quem somos nós,\nbrasileirs — filhos desta terra extraordinária."
  },

  // ── PERI ─────────────────────────────────────
  {
    nome: "Peri", bg: "img/fundo_floresta.png", char: "img/peri.png",
    texto: "Eu sou Peri, guerreiro da nação Goitacá.\nNasci livre entre as árvores e os rios.\nA floresta me ensinou tudo o que sei."
  },
  {
    nome: "Peri", bg: null, char: null,
    texto: "Minha força não vem apenas dos músculos.\nVem do conhecimento da natureza,\nda paciência do caçador e da coragem do guerreiro."
  },
  {
    nome: "Peri", bg: null, char: null,
    texto: "Conheço cada trilha, cada rio, cada planta.\nSei quais folhas curam e quais matam.\nA mata não tem segredos para mim."
  },
  {
    nome: "Peri", bg: null, char: null,
    texto: "Foi numa dessas jornadas pela floresta\nque encontrei Cecília, filha do fidalgo português\nDom Antônio de Mariz."
  },
  {
    nome: "Peri", bg: null, char: null,
    texto: "Ceci, como eu a chamo com carinho,\ntem a pureza de um anjo e a delicadeza\nde uma flor rara da mata virgem."
  },
  {
    nome: "Peri", bg: null, char: null,
    texto: "Dediquei minha vida a protegê-la.\nAbri mão de minha liberdade, de minha tribo,\nde tudo — por ela."
  },
  {
    nome: "Peri", bg: null, char: null,
    texto: "Muitos não entendiam esse amor.\nUm índio e uma portuguesa...\nMas o coração não conhece fronteiras."
  },
  {
    nome: "Peri", bg: null, char: null,
    texto: "Enfrentei os Aimorés, tribo feroz\nque aterrorizava toda a região.\nEnfrentei traidores dentro do próprio castelo."
  },
  {
    nome: "Peri", bg: null, char: null,
    texto: "Loredano, o vilão disfarçado de frei,\nplanejou destruir tudo.\nMas enquanto eu respirar, Ceci estará segura."
  },
  {
    nome: "Peri", bg: null, char: null,
    texto: "No fim, quando o castelo foi destruído,\nsalvei Ceci numa canoa,\nlevando-a para um novo começo."
  },

  // ── NARRADOR ─────────────────────────────────
  {
    nome: "Narrador", bg: "img/fundo_narrador.png", char: "img/narrador.png",
    texto: "A história de O Guarani se passa em 1604,\nno período colonial brasileiro,\nàs margens do Rio Paquequer, no Rio de Janeiro."
  },
  {
    nome: "Narrador", bg: null, char: null,
    texto: "Dom Antônio de Mariz era um fidalgo português\nhonrado e respeitado, que construiu um castelo\nno meio da floresta brasileira."
  },
  {
    nome: "Narrador", bg: null, char: null,
    texto: "Sua família vivia ali em relativa paz,\nmas rodeada de perigos:\nindígenas hostis, aventureiros ambiciosos\ne a selva imprevisível."
  },
  {
    nome: "Narrador", bg: null, char: null,
    texto: "Cecília era a filha mais querida de Dom Antônio.\nDócil, bondosa e bela,\nela representava a pureza e a inocência."
  },
  {
    nome: "Narrador", bg: null, char: null,
    texto: "Peri surge nesse cenário como um raio de luz.\nEle se torna o guardião fiel de Ceci,\nnuma devoção que ultrapassa qualquer fronteira cultural."
  },
  {
    nome: "Narrador", bg: null, char: null,
    texto: "O romance explora temas profundos:\namor impossível entre culturas diferentes,\nlealdade, sacrifício e identidade nacional."
  },
  {
    nome: "Narrador", bg: null, char: null,
    texto: "Alencar usa a natureza como personagem.\nA floresta não é apenas cenário —\né viva, é ameaça, é refúgio, é identidade."
  },
  {
    nome: "Narrador", bg: null, char: null,
    texto: "O vilão Loredano representa a corrupção\ne a ambição que destroem a harmonia.\nEle planeja roubar o tesouro de Dom Antônio."
  },
  {
    nome: "Narrador", bg: null, char: null,
    texto: "No clímax, Dom Antônio decide destruir\no próprio castelo com pólvora\npara não entregar nada aos inimigos."
  },
  {
    nome: "Narrador", bg: null, char: null,
    texto: "Peri escapa com Ceci numa canoa pelo rio.\nA cena final é poética e simbólica:\ndois mundos diferentes, unidos para sempre."
  },
  {
    nome: "Narrador", bg: null, char: null,
    texto: "O final representa o nascimento\nde uma nova nação, miscigenada e única.\nÉ a origem mítica do povo brasileiro."
  },
  {
    nome: "Narrador", bg: null, char: null,
    texto: "O Guarani é considerado o romance\nfundador da literatura nacional brasileira.\nSua influência chega até os dias de hoje."
  }
];

// ═══════════════════════════════════════════════
// ESTADO DO JOGO
// ═══════════════════════════════════════════════
let cenaAtual = 0;
let typing = false;
let fullText = "";
let index = 0;
let interval;
let quizStep = 0;
let score = 0;

const TOTAL_CENAS = cenas.length;

const text = document.getElementById("text");
const nameBox = document.getElementById("nameBox");
const char = document.getElementById("character");
const choices = document.getElementById("choices");
const skipBtn = document.getElementById("skip");
const bg = document.getElementById("bg");
const dialog = document.getElementById("dialog");
const stepCounter = document.getElementById("stepCounter");
const progressBar = document.getElementById("progressBar");

// ── SOM ──────────────────────────────────────
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTypeSound() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = 520 + Math.random() * 180;
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.04);
  } catch(e) {}
}

// ── PROGRESS BAR ─────────────────────────────
// 3 segmentos: Alencar (10), Peri (10), Narrador (12)
const segmentos = [
  { label: "Alencar", cor: "#f8d870", total: 10 },
  { label: "Peri",    cor: "#7adf7a", total: 10 },
  { label: "Narrador",cor: "#7ab8f5", total: 12 }
];

(function buildProgress() {
  progressBar.innerHTML = "";
  let idx = 0;
  segmentos.forEach(seg => {
    for (let i = 0; i < seg.total; i++) {
      const dot = document.createElement('div');
      dot.className = 'prog-dot';
      dot.id = 'dot-' + idx;
      dot.style.setProperty('--dot-cor', seg.cor);
      progressBar.appendChild(dot);
      idx++;
    }
  });
})();

function updateProgress() {
  for (let i = 0; i < TOTAL_CENAS; i++) {
    const dot = document.getElementById('dot-' + i);
    if (!dot) continue;
    if (i < cenaAtual) {
      dot.classList.add('done');
    } else {
      dot.classList.remove('done');
    }
  }
  // Label do capítulo
  if (cenaAtual < 10) {
    stepCounter.textContent = "ALENCAR " + (cenaAtual + 1) + "/10";
  } else if (cenaAtual < 20) {
    stepCounter.textContent = "PERI " + (cenaAtual - 9) + "/10";
  } else {
    stepCounter.textContent = "NARRADOR " + (cenaAtual - 19) + "/12";
  }
}

// ── TROCA DE FUNDO ───────────────────────────
function changeBg(url) {
  bg.classList.add('changing');
  setTimeout(() => {
    bg.style.backgroundImage = "url('" + url + "')";
    bg.classList.remove('changing');
  }, 300);
}

// ── DIGITAÇÃO ────────────────────────────────
function typeText(sentence) {
  typing = true;
  dialog.classList.remove('done');
  fullText = sentence;
  index = 0;
  text.innerHTML = "";

  interval = setInterval(() => {
    if (fullText[index] === "\n") {
      text.innerHTML += "<br>";
    } else {
      text.innerHTML += fullText[index];
      playTypeSound();
    }
    index++;
    if (index >= fullText.length) {
      clearInterval(interval);
      typing = false;
      dialog.classList.add('done');
    }
  }, 22);
}

// ── SKIP ─────────────────────────────────────
skipBtn.onclick = function () {
  if (typing) {
    clearInterval(interval);
    text.innerHTML = fullText.replace(/\n/g, "<br>");
    typing = false;
    dialog.classList.add('done');
  } else {
    next();
  }
};
