<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>O Guarani RPG</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }

:root {
  --rpg-font: 'Courier New', 'Lucida Console', monospace;
  --rpg-gold: #f8d870;
  --rpg-gold-dark: #c8a820;
  --rpg-dark: #0a0a0a;
  --rpg-panel: #1a1a2e;
  --rpg-panel-light: #16213e;
  --rpg-text: #f0e6c8;
  --dialog-h: 28vh;
}

body { font-family: var(--rpg-font); background: #000; }

/* ── WRAPPER PRINCIPAL ─────────────────────── */
#game {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: #000;
}

/* Scanlines */
#game::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
  );
  pointer-events: none;
  z-index: 50;
}

/* ── ÁREA DE CENA ───────────────────────────  */
#scene {
  position: relative;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

#bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center top;
  transition: opacity 0.4s ease;
}
#bg.changing { opacity: 0; }

/* ── PERSONAGEM — ancorado à base da scene ─  */
#character {
  position: absolute;
  bottom: 0;
  left: 20px;
  height: min(58%, 170px);
  width: auto;
  image-rendering: pixelated;
  z-index: 3;
  filter: drop-shadow(3px 3px 0 rgba(0,0,0,0.8));
  animation: charBob 1.8s ease-in-out infinite;
}

@keyframes charBob {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-4px); }
}

/* ── NOME — posicionado por JS ──────────────  */
#nameBox {
  position: absolute;
  background: var(--rpg-panel);
  color: var(--rpg-gold);
  font-family: var(--rpg-font);
  font-size: clamp(10px, 1.4vw, 13px);
  padding: 4px 10px;
  z-index: 4;
  letter-spacing: 1px;
  border: 2px solid var(--rpg-gold);
  outline: 2px solid #000;
  box-shadow: 3px 3px 0 #000;
  text-transform: uppercase;
  white-space: nowrap;
  /* posição padrão — JS vai sobrescrever */
  top: auto;
  bottom: 0;
  left: 0;
}

/* ── HUD ────────────────────────────────────  */
#stepCounter {
  position: absolute;
  top: 6px; left: 8px;
  z-index: 10;
  color: var(--rpg-gold);
  font-size: clamp(9px, 1.2vw, 11px);
  background: rgba(0,0,0,0.65);
  padding: 3px 8px;
  border: 1px solid var(--rpg-gold-dark);
  letter-spacing: 1px;
}

#progressBar {
  position: absolute;
  top: 6px; right: 8px;
  z-index: 10;
  display: flex;
  gap: 3px;
  align-items: center;
}
.prog-dot {
  width: 6px; height: 6px;
  background: #333;
  border: 1px solid #555;
  flex-shrink: 0;
}
.prog-dot.done {
  background: var(--dot-cor, var(--rpg-gold));
  border-color: #fff;
}

/* ── FEEDBACK QUIZ ──────────────────────────  */
#feedback {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: var(--rpg-panel);
  border: 3px solid var(--rpg-gold);
  outline: 2px solid #000;
  box-shadow: 4px 4px 0 #000;
  color: var(--rpg-gold);
  font-family: var(--rpg-font);
  font-size: clamp(11px, 1.5vw, 14px);
  padding: 16px 24px;
  text-align: center;
  line-height: 1.8;
  z-index: 200;
  display: none;
  max-width: 85%;
}

/* ── PAINEL DE DIÁLOGO ──────────────────────  */
#dialog {
  flex-shrink: 0;
  height: var(--dialog-h);
  background: var(--rpg-panel);
  border-top: 4px solid var(--rpg-gold);
  padding: 10px 14px 8px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
  z-index: 5;
}

#dialog::after {
  content: '▶';
  position: absolute;
  right: 10px; bottom: 8px;
  color: var(--rpg-gold);
  font-size: 8px;
  opacity: 0;
  animation: blink 0.8s step-end infinite;
  pointer-events: none;
}
#dialog.done::after { opacity: 1; }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

#text {
  font-size: clamp(11px, 1.8vw, 14px);
  line-height: 1.75;
  color: var(--rpg-text);
  letter-spacing: 0.3px;
  flex: 1;
  overflow: hidden;
}

#skip {
  align-self: flex-start;
  flex-shrink: 0;
  background: var(--rpg-dark);
  color: var(--rpg-gold);
  font-family: var(--rpg-font);
  font-size: clamp(10px, 1.3vw, 12px);
  padding: 6px 16px;
  cursor: pointer;
  border: 2px solid var(--rpg-gold);
  outline: 1px solid #000;
  box-shadow: 2px 2px 0 #000;
  letter-spacing: 1px;
  text-transform: uppercase;
  min-height: 34px;
  min-width: 80px;
  transition: transform 0.08s, box-shadow 0.08s;
}
#skip:hover  { background: var(--rpg-gold-dark); color: #000; }
#skip:active { transform: translate(2px,2px); box-shadow: none; }

#choices {
  display: none;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
}
#choices button {
  padding: 6px 8px;
  border: 2px solid var(--rpg-gold);
  outline: 1px solid #000;
  background: var(--rpg-panel-light);
  color: var(--rpg-text);
  font-family: var(--rpg-font);
  font-size: clamp(9px, 1.3vw, 11px);
  cursor: pointer;
  box-shadow: 2px 2px 0 #000;
  text-align: left;
  line-height: 1.5;
  transition: transform 0.08s, background 0.1s;
}
#choices button:hover  { background: var(--rpg-gold-dark); color: #000; }
#choices button:active { transform: translate(2px,2px); box-shadow: none; }

/* ── TELA FINAL ─────────────────────────────  */
#finalScreen {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.97);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
  animation: fadeIn 0.5s ease;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

#finalBox {
  background: var(--rpg-panel);
  border: 3px solid var(--rpg-gold);
  outline: 3px solid #000;
  box-shadow: 6px 6px 0 #000, 0 0 0 9px #000, 0 0 0 12px var(--rpg-gold);
  padding: 28px 36px;
  text-align: center;
  color: var(--rpg-gold);
  font-family: var(--rpg-font);
  font-size: clamp(11px, 1.5vw, 13px);
  line-height: 2.2;
  letter-spacing: 1px;
  max-width: min(360px, 90vw);
}
#finalBox .trophy {
  font-size: 32px; display: block; margin-bottom: 12px;
  animation: spin 2s ease-in-out infinite alternate;
}
@keyframes spin {
  0%   { transform: scale(1) rotate(-5deg); }
  100% { transform: scale(1.1) rotate(5deg); }
}
#finalBox .title-line {
  color: #fff; font-size: clamp(10px,1.4vw,13px); display: block;
  margin-bottom: 14px; text-shadow: 2px 2px 0 var(--rpg-gold-dark);
}
#restartBtn {
  margin-top: 16px;
  background: var(--rpg-dark);
  color: var(--rpg-gold);
  font-family: var(--rpg-font);
  font-size: clamp(10px,1.3vw,12px);
  padding: 8px 20px;
  cursor: pointer;
  border: 2px solid var(--rpg-gold);
  outline: 1px solid #000;
  box-shadow: 2px 2px 0 #000;
  letter-spacing: 1px;
  text-transform: uppercase;
}
#restartBtn:hover  { background: var(--rpg-gold-dark); color: #000; }
#restartBtn:active { transform: translate(2px,2px); box-shadow: none; }

/* ── RESPONSIVO ─────────────────────────────  */
@media (max-width: 600px) and (orientation: portrait) {
  :root { --dialog-h: 34vh; }
}
@media (orientation: landscape) and (max-height: 480px) {
  :root { --dialog-h: 38vh; }
  #character { height: min(70%, 130px); }
  #finalBox  { max-width: 70vw; }
}
</style>
</head>
<body>

<div id="game">

  <div id="scene">
    <div id="bg"></div>
    <div id="stepCounter">★ CAP.1</div>
    <div id="progressBar"></div>
    <img id="character" src="img/alencar.png" alt="personagem">
    <div id="nameBox">ALENCAR</div>
    <div id="feedback"></div>
  </div>

  <div id="dialog">
    <div id="text"></div>
    <div id="choices"></div>
    <button id="skip">▶ SKIP</button>
  </div>

</div>

<div id="finalScreen">
  <div id="finalBox">
    <span class="trophy">🏆</span>
    <span class="title-line">PARABÉNS!</span>
    Você concluiu<br>O Guarani!<br><br>
    Quiz: <span id="scoreDisplay">—</span>
    <br>
    <button id="restartBtn">↺ JOGAR NOVAMENTE</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// ROTEIRO
// ════════════════════════════════════════════
const cenas = [
  // ALENCAR
  { nome:"Alencar", bg:"img/fundo_biblioteca.png", char:"img/alencar.png",
    texto:"Olá, viajante... Eu sou José de Alencar.\nNasci no Ceará em 1829 e me tornei\num dos maiores escritores do Romantismo brasileiro." },
  { nome:"Alencar", bg:null, char:null,
    texto:"Fui advogado, jornalista e político.\nMas foi pela literatura que deixei\nminha marca mais profunda na história do Brasil." },
  { nome:"Alencar", bg:null, char:null,
    texto:"No século XIX, o Brasil acabara de se tornar\nindependente de Portugal. Havia uma grande\nnecessidade de construir uma identidade nacional." },
  { nome:"Alencar", bg:null, char:null,
    texto:"Muitos intelectuais olhavam apenas para a Europa\ncomo modelo de civilização e cultura.\nEu discordava profundamente disso." },
  { nome:"Alencar", bg:null, char:null,
    texto:"O Brasil tinha sua própria riqueza:\na natureza exuberante, os povos indígenas,\nos costumes únicos que surgiram nestas terras." },
  { nome:"Alencar", bg:null, char:null,
    texto:"Por isso escrevi O Guarani, publicado em 1857.\nPrimeiro como folhetim no Correio Mercantil,\ndepois como livro que conquistou o país." },
  { nome:"Alencar", bg:null, char:null,
    texto:"Minha obra coloca o indígena como herói nacional.\nPeri não é um selvagem — ele é nobre,\ncorajoso, leal e profundamente humano." },
  { nome:"Alencar", bg:null, char:null,
    texto:"O amor entre Peri e Cecília simboliza\na mistura de culturas que formou o povo brasileiro.\nIsso é o que nos torna únicos no mundo." },
  { nome:"Alencar", bg:null, char:null,
    texto:"O Guarani faz parte da minha trilogia indianista,\njunto com Iracema e Ubirajara.\nTodas exaltam a alma da terra brasileira." },
  { nome:"Alencar", bg:null, char:null,
    texto:"Espero que ao conhecer Peri e Ceci,\nvocê entenda melhor quem somos nós,\nbrasileiros — filhos desta terra extraordinária." },

  // PERI
  { nome:"Peri", bg:"img/fundo_floresta.png", char:"img/peri.png",
    texto:"Eu sou Peri, guerreiro da nação Goitacá.\nNasci livre entre as árvores e os rios.\nA floresta me ensinou tudo o que sei." },
  { nome:"Peri", bg:null, char:null,
    texto:"Minha força não vem apenas dos músculos.\nVem do conhecimento da natureza,\nda paciência do caçador e da coragem do guerreiro." },
  { nome:"Peri", bg:null, char:null,
    texto:"Conheço cada trilha, cada rio, cada planta.\nSei quais folhas curam e quais matam.\nA mata não tem segredos para mim." },
  { nome:"Peri", bg:null, char:null,
    texto:"Foi numa dessas jornadas pela floresta\nque encontrei Cecília, filha do fidalgo português\nDom Antônio de Mariz." },
  { nome:"Peri", bg:null, char:null,
    texto:"Ceci, como eu a chamo com carinho,\ntem a pureza de um anjo e a delicadeza\nde uma flor rara da mata virgem." },
  { nome:"Peri", bg:null, char:null,
    texto:"Dediquei minha vida a protegê-la.\nAbri mão de minha liberdade, de minha tribo,\nde tudo — por ela." },
  { nome:"Peri", bg:null, char:null,
    texto:"Muitos não entendiam esse amor.\nUm índio e uma portuguesa...\nMas o coração não conhece fronteiras." },
  { nome:"Peri", bg:null, char:null,
    texto:"Enfrentei os Aimorés, tribo feroz\nque aterrorizava toda a região.\nEnfrentei traidores dentro do próprio castelo." },
  { nome:"Peri", bg:null, char:null,
    texto:"Loredano, o vilão disfarçado de frei,\nplanejou destruir tudo.\nMas enquanto eu respirar, Ceci estará segura." },
  { nome:"Peri", bg:null, char:null,
    texto:"No fim, quando o castelo foi destruído,\nsalvei Ceci numa canoa,\nlevando-a para um novo começo." },

  // NARRADOR
  { nome:"Narrador", bg:"img/fundo_narrador.png", char:"img/narrador.png",
    texto:"A história de O Guarani se passa em 1604,\nno período colonial brasileiro,\nàs margens do Rio Paquequer, no Rio de Janeiro." },
  { nome:"Narrador", bg:null, char:null,
    texto:"Dom Antônio de Mariz era um fidalgo português\nhonrado e respeitado, que construiu um castelo\nno meio da floresta brasileira." },
  { nome:"Narrador", bg:null, char:null,
    texto:"Sua família vivia ali em relativa paz,\nmas rodeada de perigos:\nindígenas hostis, aventureiros ambiciosos\ne a selva imprevisível." },
  { nome:"Narrador", bg:null, char:null,
    texto:"Cecília era a filha mais querida de Dom Antônio.\nDócil, bondosa e bela,\nela representava a pureza e a inocência." },
  { nome:"Narrador", bg:null, char:null,
    texto:"Peri surge nesse cenário como um raio de luz.\nEle se torna o guardião fiel de Ceci,\nnuma devoção que ultrapassa qualquer fronteira cultural." },
  { nome:"Narrador", bg:null, char:null,
    texto:"O romance explora temas profundos:\namor impossível entre culturas diferentes,\nlealdade, sacrifício e identidade nacional." },
  { nome:"Narrador", bg:null, char:null,
    texto:"Alencar usa a natureza como personagem.\nA floresta não é apenas cenário —\né viva, é ameaça, é refúgio, é identidade." },
  { nome:"Narrador", bg:null, char:null,
    texto:"O vilão Loredano representa a corrupção\ne a ambição que destroem a harmonia.\nEle planeja roubar o tesouro de Dom Antônio." },
  { nome:"Narrador", bg:null, char:null,
    texto:"No clímax, Dom Antônio decide destruir\no próprio castelo com pólvora\npara não entregar nada aos inimigos." },
  { nome:"Narrador", bg:null, char:null,
    texto:"Peri escapa com Ceci numa canoa pelo rio.\nA cena final é poética e simbólica:\ndois mundos diferentes, unidos para sempre." },
  { nome:"Narrador", bg:null, char:null,
    texto:"O final representa o nascimento\nde uma nova nação, miscigenada e única.\nÉ a origem mítica do povo brasileiro." },
  { nome:"Narrador", bg:null, char:null,
    texto:"O Guarani é considerado o romance\nfundador da literatura nacional brasileira.\nSua influência chega até os dias de hoje." }
];

// ════════════════════════════════════════════
// QUIZ
// ════════════════════════════════════════════
const quiz = [
  { pergunta:"Em que ano foi publicado O Guarani?",
    opcoes:["1857","1872","1840","1865"], certa:0,
    explicacao:"O Guarani foi publicado em 1857." },
  { pergunta:"A qual nação indígena pertence Peri?",
    opcoes:["Tupi","Aimoré","Goitacá","Guaraní"], certa:2,
    explicacao:"Peri é guerreiro da nação Goitacá." },
  { pergunta:"Como se chama o vilão disfarçado de frei?",
    opcoes:["Dom Antônio","Loredano","Álvaro","Diogo"], certa:1,
    explicacao:"Loredano é o vilão disfarçado de frei." },
  { pergunta:"Às margens de qual rio se passa a história?",
    opcoes:["Amazonas","São Francisco","Paquequer","Paraná"], certa:2,
    explicacao:"A história se passa às margens do Rio Paquequer." },
  { pergunta:"O Guarani pertence a qual trilogia de Alencar?",
    opcoes:["Urbana","Indianista","Sertaneja","Histórica"], certa:1,
    explicacao:"Faz parte da trilogia Indianista." }
];

// ════════════════════════════════════════════
// ESTADO
// ════════════════════════════════════════════
let cenaAtual = 0;
let typing    = false;
let fullText  = "";
let charIdx   = 0;
let interval  = null;
let quizStep  = 0;
let score     = 0;
let inQuiz    = false;

const TOTAL = cenas.length;

const textEl       = document.getElementById("text");
const nameBox      = document.getElementById("nameBox");
const charEl       = document.getElementById("character");
const choicesEl    = document.getElementById("choices");
const skipBtn      = document.getElementById("skip");
const bgEl         = document.getElementById("bg");
const sceneEl      = document.getElementById("scene");
const dialogEl     = document.getElementById("dialog");
const stepCounter  = document.getElementById("stepCounter");
const progressBar  = document.getElementById("progressBar");
const feedbackEl   = document.getElementById("feedback");
const finalScreen  = document.getElementById("finalScreen");
const scoreDisplay = document.getElementById("scoreDisplay");
const restartBtn   = document.getElementById("restartBtn");

// ── POSICIONAR NAMEBOX acima e à direita do char
function positionNameBox() {
  const charRect  = charEl.getBoundingClientRect();
  const sceneRect = sceneEl.getBoundingClientRect();
  const charTop   = charRect.top  - sceneRect.top;
  const charLeft  = charRect.left - sceneRect.left;
  const charW     = charRect.width;

  // Tenta colocar à direita do personagem
  let nbLeft = charLeft + charW + 6;
  let nbTop  = Math.max(4, charTop - 4);

  // Se sair da tela, coloca acima
  if (nbLeft + 100 > sceneRect.width) {
    nbLeft = charLeft;
    nbTop  = Math.max(4, charTop - 32);
  }

  nameBox.style.top    = nbTop  + "px";
  nameBox.style.left   = nbLeft + "px";
  nameBox.style.bottom = "auto";
}

window.addEventListener("resize", positionNameBox);

// ── PROGRESS BAR ───────────────────────────
const segCores = Array(10).fill("#f8d870")
  .concat(Array(10).fill("#7adf7a"))
  .concat(Array(12).fill("#7ab8f5"));

(function buildProgress() {
  progressBar.innerHTML = "";
  for (let i = 0; i < TOTAL; i++) {
    const d = document.createElement("div");
    d.className = "prog-dot";
    d.id = "dot-" + i;
    d.style.setProperty("--dot-cor", segCores[i]);
    progressBar.appendChild(d);
  }
})();

function updateProgress() {
  for (let i = 0; i < TOTAL; i++) {
    const d = document.getElementById("dot-" + i);
    if (d) d.classList.toggle("done", i < cenaAtual);
  }
  if      (cenaAtual < 10) stepCounter.textContent = "ALENCAR "  + (cenaAtual + 1)  + "/10";
  else if (cenaAtual < 20) stepCounter.textContent = "PERI "     + (cenaAtual - 9)  + "/10";
  else                     stepCounter.textContent = "NARRADOR " + (cenaAtual - 19) + "/12";
}

// ── FUNDO ───────────────────────────────────
function changeBg(url, instant) {
  if (instant) { bgEl.style.backgroundImage = "url('" + url + "')"; return; }
  bgEl.classList.add("changing");
  setTimeout(() => {
    bgEl.style.backgroundImage = "url('" + url + "')";
    bgEl.classList.remove("changing");
  }, 300);
}

// ── SOM ─────────────────────────────────────
let audioCtx = null;
function getCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; }
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
function beep(freq, type, vol, dur, delay) {
  const ctx = getCtx(); if (!ctx) return;
  delay = delay || 0;
  try {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.value = freq;
    const t = ctx.currentTime + delay;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur);
  } catch(e) {}
}
function playType()    { beep(520 + Math.random()*180, "sine",     0.10, 0.04); }
function playCorrect() { [523,659,784].forEach((f,i) => beep(f,"square",0.13,0.14, i*0.11)); }
function playWrong()   { beep(160, "sawtooth", 0.18, 0.3); }

// ── DIGITAÇÃO ───────────────────────────────
function typeText(txt) {
  typing = true;
  dialogEl.classList.remove("done");
  fullText = txt;
  charIdx = 0;
  textEl.innerHTML = "";
  clearInterval(interval);
  interval = setInterval(() => {
    const ch = fullText[charIdx];
    if (ch === "\n") textEl.innerHTML += "<br>";
    else { textEl.innerHTML += ch; playType(); }
    charIdx++;
    if (charIdx >= fullText.length) {
      clearInterval(interval);
      typing = false;
      dialogEl.classList.add("done");
    }
  }, 22);
}

// ── SKIP ────────────────────────────────────
skipBtn.onclick = function() {
  if (inQuiz) return;
  if (typing) {
    clearInterval(interval);
    textEl.innerHTML = fullText.replace(/\n/g, "<br>");
    typing = false;
    dialogEl.classList.add("done");
  } else {
    next();
  }
};

// ── PRÓXIMA CENA ────────────────────────────
function next() {
  if (typing || inQuiz) return;
  if (choicesEl.style.display === "grid") return;
  if (cenaAtual >= TOTAL) { startQuiz(); return; }

  const c = cenas[cenaAtual];

  if (c.bg)   changeBg(c.bg, cenaAtual === 0);

  if (c.char) {
    charEl.src = c.char;
    charEl.style.visibility = "visible";
    // Posiciona após carregar
    charEl.onload = positionNameBox;
    if (charEl.complete && charEl.naturalWidth > 0) positionNameBox();
  } else {
    // mantém char atual, só reposiciona nameBox
    positionNameBox();
  }

  nameBox.textContent = c.nome.toUpperCase();
  choicesEl.style.display = "none";
  choicesEl.innerHTML = "";
  skipBtn.style.display = "block";
  updateProgress();
  typeText(c.texto);
  cenaAtual++;
}

// ── QUIZ ────────────────────────────────────
function startQuiz() {
  inQuiz = true; quizStep = 0; score = 0;
  skipBtn.style.display = "none";
  nameBox.textContent = "QUIZ";
  charEl.style.visibility = "hidden";
  stepCounter.textContent = "QUIZ";
  showQ();
}

function showQ() {
  if (quizStep >= quiz.length) { endGame(); return; }
  const q = quiz[quizStep];
  textEl.innerHTML = "<b>" + (quizStep+1) + "/" + quiz.length + "</b> — " + q.pergunta;
  dialogEl.classList.remove("done");
  choicesEl.innerHTML = "";
  choicesEl.style.display = "grid";
  q.opcoes.forEach((op, i) => {
    const btn = document.createElement("button");
    btn.textContent = op;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(chosen) {
  const q = quiz[quizStep];
  const ok = chosen === q.certa;
  if (ok) score++;
  Array.from(choicesEl.children).forEach((b, i) => {
    b.disabled = true;
    if (i === q.certa)           b.style.background = "#1a4a1a";
    else if (i === chosen && !ok) b.style.background = "#4a1a1a";
  });
  if (ok) { playCorrect(); showFeedback("✓ " + q.explicacao, true); }
  else    { playWrong();   showFeedback("✗ Errado! " + q.explicacao, false); }
}

function showFeedback(msg, ok) {
  feedbackEl.style.display = "block";
  feedbackEl.style.borderColor = ok ? "#7adf7a" : "#df5a5a";
  feedbackEl.style.color       = ok ? "#7adf7a" : "#df7a7a";
  feedbackEl.textContent = msg;
  setTimeout(() => {
    feedbackEl.style.display = "none";
    quizStep++;
    showQ();
  }, 1800);
}

function endGame() {
  inQuiz = false;
  finalScreen.style.display = "flex";
  scoreDisplay.textContent = score + " de " + quiz.length + " (" + Math.round(score/quiz.length*100) + "%)";
}

// ── REINICIAR ───────────────────────────────
restartBtn.onclick = function() {
  cenaAtual = 0; quizStep = 0; score = 0;
  inQuiz = false; typing = false;
  clearInterval(interval);
  finalScreen.style.display = "none";
  choicesEl.style.display = "none";
  choicesEl.innerHTML = "";
  skipBtn.style.display = "block";
  charEl.style.visibility = "visible";
  textEl.innerHTML = "";
  updateProgress();
  next();
};

// ── INICIAR ─────────────────────────────────
next();
</script>
</body>
</html>
